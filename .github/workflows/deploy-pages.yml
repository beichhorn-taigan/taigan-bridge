name: Deploy to GitHub Pages

# The hosted demo moved to https://taiganjp.com/tools/taigan-bridge/
# (served from the taiganjp site repo). This workflow now publishes only
# a redirect stub so old links and bookmarks land at the new home.
# The pre-redirect workflow (full build + GoatCounter injection) lives in
# git history if it's ever needed again.

on:
  push:
    branches: [main]
    paths:
      - 'pages-redirect/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload redirect stub
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
